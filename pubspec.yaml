name: qrcode_hd
version: 1.0.0+1
publish_to: none
description: QR Code HD est une application qui permet de générer des Qr Code, de scanner et d'exporter votre QR Code.
environment: 
  sdk: '>=2.18.0 <3.0.0'

dependencies: 
  cupertino_icons: ^1.0.2
  get: 4.6.5
  flutter: 
    sdk: flutter
  qr_flutter: ^4.0.0
  url_launcher: ^6.1.6
  path_provider: ^2.0.11
  gallery_saver: ^2.3.2
  string_validator: ^0.3.0
  flutter_barcode_scanner: ^2.0.0
  flutter_json_viewer: ^1.0.1
  fluttertoast: ^8.1.1
  flutter_app_version_checker: ^0.3.1
  open_file: ^3.2.1

dev_dependencies: 
  flutter_lints: 2.0.1
  flutter_test: 
    sdk: flutter

flutter: 
  uses-material-design: true
  assets:
    - assets/img/

